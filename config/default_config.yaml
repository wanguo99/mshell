      - "#A6E22E"
      - "#F4BF75"
      - "#66D9EF"
      - "#AE81FF"
      - "#A1EFE4"
      - "#F9F8F5"

# 文件传输设置
file_transfer:
  default_local_path: "~"
  default_remote_path: "~"
  show_hidden_files: false
  confirm_overwrite: true
  transfer_buffer_size: 32768  # 32KB

# 应用设置
application:
  language: "zh_CN"  # zh_CN, en_US
  theme: "system"  # system, light, dark
  check_updates: true
  save_session_on_exit: true
  restore_session_on_startup: true
